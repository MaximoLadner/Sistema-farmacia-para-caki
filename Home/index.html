<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farmacia Bongiorno</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="container">
        <section class="hero">
            <h1>Ficha de Ingreso de Materia Prima</h1>
            <p>
                Importa tu planilla de Excel y la tabla se completa automáticamente.
                El sistema deja una sola fila por materia prima: la más reciente según fecha de ingreso.
            </p>
        </section>

        <section class="controls">
            <div class="file-wrap">
                <label for="excelInput">Planilla:</label>
                <input id="excelInput" type="file" accept=".xls,.xlsx" />
            </div>
            <button id="processBtn" class="btn btn-process">Cargar y Filtrar</button>
            <button id="exportBtn" class="btn btn-export" disabled>Exportar Resultado</button>
        </section>

        <div id="status" class="status">Esperando archivo Excel...</div>

        <section id="searchPanel" class="search-panel hidden">
            <label class="search-label" for="buscador">Buscar en la tabla</label>
            <div class="search-box">
                <span class="search-icon" aria-hidden="true">🔎</span>
                <input type="text" id="buscador" placeholder="Buscar materia prima, proveedor, lote..." onkeyup="filtrar()" />
            </div>
        </section>

        <section class="table-wrap">
            <table id="dataTable" class="hidden">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="java.js"></script>
</body>
</html>
